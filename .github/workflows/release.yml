name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # softprops/action-gh-release needs this to publish

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          # Distinct cache from CI's, keyed on the release target so the two
          # workflows don't poison each other's target/ contents.
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # Bundles the binary plus the fish files in one tarball so downstream
      # packagers (Homebrew, install scripts) can pull a single URL and have
      # a complete install. The binary is already stripped via the
      # release profile in Cargo.toml.
      - name: Package
        run: |
          name="angler-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/angler-daemon" "dist/$name/"
          cp -r conf.d functions LICENSE README.md "dist/$name/"
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          shasum -a 256 "dist/$name.tar.gz" > "dist/$name.tar.gz.sha256"

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
